<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>My Keep - To Do</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-9ndCyUa6mYfC9b0s4nHSJV3P88Y8HIzv1WlZ9gduFF0psvJ0V6cR0F0Yrjar1pg" crossorigin="anonymous">
    <style>
        body {
            padding-top: 2rem;
        }
        .card.done .card-body {
            text-decoration: line-through;
            color: gray;
        }
    </style>
</head>
<body>
<div class="container">
    <h1 class="mb-4 text-center">My Keep</h1>
    <div class="row mb-4">
        <div class="col">
            <div class="input-group">
                <input type="text" id="noteInput" class="form-control" placeholder="Agregar nota" />
                <button id="addBtn" class="btn btn-primary">Añadir</button>
            </div>
        </div>
    </div>
    <div id="notes" class="row gy-3">
        <!-- Notas aparecerán aquí -->
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" integrity="sha384-ENjdO4Dr2bkBIFxQpeo5j4M/i1MG5B2x6mdsxBztQE1XK2axSmasKf9HLaa7069" crossorigin="anonymous"></script>
<script>
    const notesContainer = document.getElementById('notes');
    const noteInput = document.getElementById('noteInput');
    const addBtn = document.getElementById('addBtn');

    let notes = [];

    // Load notes from localStorage
    function loadNotes() {
        const data = localStorage.getItem('notes');
        notes = data ? JSON.parse(data) : [];
    }

    function saveNotes() {
        localStorage.setItem('notes', JSON.stringify(notes));
    }

    function renderNotes() {
        notesContainer.innerHTML = '';
        notes.forEach((note, index) => {
            const col = document.createElement('div');
            col.className = 'col-12 col-sm-6 col-lg-4';

            const card = document.createElement('div');
            card.className = 'card' + (note.done ? ' done' : '');

            const cardBody = document.createElement('div');
            cardBody.className = 'card-body d-flex align-items-start';

            const text = document.createElement('p');
            text.className = 'flex-grow-1 m-0';
            text.textContent = note.text;
            cardBody.appendChild(text);

            const doneBtn = document.createElement('button');
            doneBtn.className = 'btn btn-sm btn-success me-2';
            doneBtn.textContent = '✓';
            doneBtn.addEventListener('click', () => {
                note.done = !note.done;
                saveNotes();
                renderNotes();
            });

            const deleteBtn = document.createElement('button');
            deleteBtn.className = 'btn btn-sm btn-danger';
            deleteBtn.textContent = '🗑';
            deleteBtn.addEventListener('click', () => {
                notes.splice(index, 1);
                saveNotes();
                renderNotes();
            });

            cardBody.appendChild(doneBtn);
            cardBody.appendChild(deleteBtn);
            card.appendChild(cardBody);
            col.appendChild(card);
            notesContainer.appendChild(col);
        });
    }

    addBtn.addEventListener('click', () => {
        const text = noteInput.value.trim();
        if (text) {
            notes.push({ text, done: false });
            saveNotes();
            renderNotes();
            noteInput.value = '';
        }
    });

    noteInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            addBtn.click();
        }
    });

    // Initialize
    loadNotes();
    renderNotes();
</script>
</body>
</html>
